name: ci

on:
  push:
  pull_request:
    branches: [main]

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025-vs2026]
    steps:
      - uses: actions/checkout@v6
      - name: Install stable Rust
        run: rustup toolchain install stable --component clippy --component rustfmt
      - name: Format
        run: rustup run stable cargo fmt --all -- --check
      - name: Clippy
        run: rustup run stable cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: rustup run stable cargo test --all-targets --all-features

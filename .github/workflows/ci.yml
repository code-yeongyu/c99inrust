name: ci

on:
  push:
  pull_request:
    branches: [main]

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025-vs2026]
    steps:
      - uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: "2"
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main
          GIT_CONFIG_KEY_1: advice.defaultBranchName
          GIT_CONFIG_VALUE_1: "false"
      - name: Install stable Rust
        run: rustup toolchain install stable --component clippy --component rustfmt
      - name: Format
        run: rustup run stable cargo fmt --all -- --check
      - name: Clippy
        run: rustup run stable cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic -W clippy::nursery -W clippy::cargo
      - name: Test
        run: rustup run stable cargo test --all-targets --all-features

  quality:
    name: quality gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: "2"
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main
          GIT_CONFIG_KEY_1: advice.defaultBranchName
          GIT_CONFIG_VALUE_1: "false"
      - name: Install stable Rust
        run: rustup toolchain install stable
      - name: Cache cargo QA tools
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/bin/cargo-deny
            ~/.cargo/bin/cargo-machete
            ~/.cargo/bin/cargo-nextest
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/git
            ~/.cargo/registry
            target/cargo-tools
          key: cargo-qa-tools-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: cargo-qa-tools-${{ runner.os }}-
      - name: Install cargo QA tools
        env:
          CARGO_TARGET_DIR: target/cargo-tools
        run: |
          missing=0
          for tool in cargo-audit cargo-deny cargo-machete cargo-nextest; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            rustup run stable cargo install --locked cargo-audit cargo-deny cargo-machete cargo-nextest
          fi
      - name: Shell syntax
        run: |
          bash -n tools/check-rust-no-excuses.sh
          bash -n tools/doom-compile-scan.sh
          bash -n tools/doom-link-scan.sh
          bash -n tools/doom-smoke.sh
          bash -n tools/doom-input-smoke.sh
          bash -n tools/doom-movement-smoke.sh
          bash -n tools/doom-manual-play.sh
      - name: Rust no-excuse rules
        run: tools/check-rust-no-excuses.sh src tests
      - name: Nextest
        run: rustup run stable cargo nextest run --all-targets --all-features
      - name: Dependency and advisory gates
        run: |
          rustup run stable cargo machete
          rustup run stable cargo deny check
          rustup run stable cargo audit

  doom-compile-scan:
    name: doom compile/link scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: "2"
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main
          GIT_CONFIG_KEY_1: advice.defaultBranchName
          GIT_CONFIG_VALUE_1: "false"
      - name: Install stable Rust
        run: rustup toolchain install stable
      - name: Build compiler
        run: rustup run stable cargo build
      - name: Clone official Doom source
        run: git clone --depth 1 https://github.com/id-Software/DOOM "$RUNNER_TEMP/DOOM"
      - name: Compile official Doom translation units
        env:
          C99INRUST_BIN: target/debug/c99inrust
          TMPDIR: ${{ runner.temp }}
        run: tools/doom-compile-scan.sh "$RUNNER_TEMP/DOOM" "$RUNNER_TEMP/doom-compile-scan.txt"
      - name: Verify Doom compile scan counts
        run: |
          grep -qx 'ok=62' "$RUNNER_TEMP/doom-compile-scan.txt"
          grep -qx 'fail=0' "$RUNNER_TEMP/doom-compile-scan.txt"
      - name: Link official Doom executable
        env:
          C99INRUST_BIN: target/debug/c99inrust
        run: tools/doom-link-scan.sh "$RUNNER_TEMP/DOOM" "$RUNNER_TEMP/doom-link-scan"
      - name: Verify Doom link scan
        run: |
          grep -qx 'compile_ok=62 compile_fail=0' "$RUNNER_TEMP/doom-link-scan/link-scan.log"
          grep -qx 'link_status=0' "$RUNNER_TEMP/doom-link-scan/link-scan.log"
